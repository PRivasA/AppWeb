<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .contenedor {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .mensaje {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .descripcion {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .boton {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .timestamp {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Ingenieria de software</h1>
        <p class="mensaje">{{ mensaje }}</p>
    
        </p>
        <button class="boton" onclick="obtenerMensaje()">Obtener Mensaje</button>
        <p class="timestamp" id="resultado"></p>
    </div>
    
    <script>
        function obtenerMensaje() {
            fetch('/api/mensaje')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('resultado').textContent = data.mensaje;
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
